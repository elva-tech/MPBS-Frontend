version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: mpbs-backend:prod
    container_name: mpbs-backend
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/health/live').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s